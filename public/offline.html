<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dicha Coffee Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #faf7f0 0%, #f4f2eb 100%);
        color: #1d3e2b;
        font-family: Pretendard, sans-serif;
      }

      main {
        width: min(92vw, 420px);
        padding: 32px 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 40px rgba(24, 31, 25, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #5e665f;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>네트워크가 복구되면 앱 셸과 최신 데이터를 다시 불러옵니다.</p>
    </main>
  </body>
  </html>
